<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshansh Kumar — Resume</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="template.css">
  <style>
    /* ── Toolbar (lives in index.html since it's UI chrome, not the resume) ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: center; align-items: center; gap: 14px;
      padding: 10px 20px; flex-wrap: wrap;
      background: var(--bar-bg); border-bottom: 1px solid var(--bar-border);
      transition: background 0.3s;
    }
    .toolbar-group { display: flex; align-items: center; gap: 8px; }
    .toolbar-label { font-size: 11px; font-weight: 500; color: var(--muted); }
    .toolbar button {
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
      transition: all 0.15s;
    }
    .toolbar button:hover { opacity: 0.8; }
    .toolbar button.primary {
      background: var(--accent); color: #fff; border-color: transparent;
    }
    .toolbar .color-wrap {
      position: relative; width: 26px; height: 26px;
      border-radius: 6px; overflow: hidden; border: 2px solid var(--accent);
    }
    .toolbar .color-wrap input[type="color"] {
      position: absolute; top: -4px; left: -4px;
      width: 34px; height: 34px; border: none; cursor: pointer; background: transparent;
    }
    .toolbar .divider { width: 1px; height: 22px; background: var(--border); }
  </style>
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────── -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="primary" data-action="pdf">📄 Download PDF</button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Theme</span>
      <button data-action="theme" id="themeBtn">🌙 Dark</button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Accent</span>
      <div class="color-wrap" id="colorPreview">
        <input data-action="accent" type="color" id="accentPicker" value="#2563eb">
      </div>
      <button data-action="reset-accent" style="font-size:11px;padding:5px 10px;">Reset</button>
    </div>
  </div>

  <!-- ── Resume Container ─────────────────────── -->
  <div class="page" id="resume">
    <div class="status">Loading resume.md…</div>
  </div>

  <!-- ── Scripts ──────────────────────────────── -->
  <script src="parser.js"></script>
  <script src="toolbar.js"></script>
  <script>
    ResumeParser.load('resume.md');
  </script>

</body>
</html>
